<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus | نظام إدارة شركات الماركتينج والبرودكشن</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <div class="sidebar-backdrop" id="backdrop" onclick="toggleSidebar(false)"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-row">
        <div class="brand-mark">N</div>
        <div>
          <div class="brand-name">Nexus</div>
          <div class="brand-sub">MARKETING &amp; PRODUCTION OS</div>
        </div>
      </div>
      <div class="clapper-stripe"></div>
    </div>

    <nav class="nav" id="navList"></nav>

    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="user-avatar">هب</div>
        <div>
          <div class="user-name">هبة الشريف</div>
          <div class="user-role">مديرة العمليات</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="hamburger" onclick="toggleSidebar(true)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
        </button>
        <div>
          <div class="topbar-title" id="pageTitle">لوحة التحكم</div>
          <div class="topbar-sub" id="pageSub">نظرة عامة على أداء الشركة اليوم</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="rec-pill" id="recPill"><span class="rec-dot"></span><span class="txt" id="recText">2 تصوير جاري دلوقتي</span></div>
        <button class="btn btn-primary" onclick="showToast('تم فتح نموذج إضافة سريع')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          إضافة جديد
        </button>
      </div>
    </div>

    <div class="content" id="content"></div>
  </div>
</div>

<button class="mobile-fab" onclick="switchView('scheduling')" title="تحديث سريع من الموقع">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="4"/><path d="M5 7h2l1-2h8l1 2h2a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z"/></svg>
</button>

<div class="overlay" id="overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
